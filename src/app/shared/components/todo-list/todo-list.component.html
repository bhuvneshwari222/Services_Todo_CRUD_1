<ul class="list-group" *ngIf="todosArr.length > 0; else noTodo">
    <li class="list-group-item d-flex justify-content-between" *ngFor="let todo of todosArr; trackBy : trackByTodoID">
        <strong>{{todo.todoItem}}</strong>
        <div>
            <button class="mr-2" (click)="onEdit(todo)" mat-raised-button color="primary">
                <mat-icon>edit</mat-icon>
            </button>
            <button (click)="onRemove(todo.todoID)" mat-raised-button color="warn">
                <mat-icon>delete</mat-icon>
            </button>
        </div>
    </li>
</ul>
<ng-template #noTodo>
    <p class="alert alert-info">No Todo!!!</p>
</ng-template>
